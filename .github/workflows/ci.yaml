name: CI Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  # Required for CodeQL
  security-events: write
  # Required for creating releases
  contents: write

jobs:
  builds:
    uses: ./.github/workflows/build.yaml
    with:
      codeql: true

  release:
    needs: builds
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir release
          cp artifacts/vcpkg-windows-ci/vcpkg.exe release/vcpkg-windows-x64.exe
          cp artifacts/vcpkg-linux-ci/vcpkg release/vcpkg-linux-x64
          chmod +x release/vcpkg-linux-x64
          cp artifacts/vcpkg-linux-arm64-ci/vcpkg release/vcpkg-linux-arm64
          chmod +x release/vcpkg-linux-arm64
          cp artifacts/vcpkg-macos-ci/vcpkg release/vcpkg-macos
          chmod +x release/vcpkg-macos
      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest release/* \
            --title "Latest build" \
            --prerelease \
            --notes "Latest build from the \`main\` branch (commit \`${{ github.sha }}\`)."
